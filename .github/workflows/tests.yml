name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -p 'test_*.py'

  package-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ".[dev]"
      - run: ruff check .
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: overlap-monitor --version

  cupti-header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install NVIDIA CUDA headers
        run: |
          python -m pip install \
            nvidia-cuda-cupti-cu12==12.8.90 \
            nvidia-cuda-runtime-cu12==12.8.90 \
            nvidia-cuda-nvcc-cu12==12.8.93
      - name: Check native collector against CUPTI headers
        run: |
          site_packages=$(python -c 'import site; print(site.getsitepackages()[0])')
          g++ -std=c++17 -fsyntax-only \
            -Inative/cupti_collector/include \
            -I"$site_packages/nvidia/cuda_cupti/include" \
            -I"$site_packages/nvidia/cuda_runtime/include" \
            -I"$site_packages/nvidia/cuda_nvcc/include" \
            native/cupti_collector/src/collector.cpp
